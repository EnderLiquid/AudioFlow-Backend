# 测试专用配置（单元测试运行时自动加载）

############## 测试环境特定配置 ##############
# 数据库配置 - 使用真实MySQL测试库
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/audioflow_test?useSSL=false&serverTimezone=UTC&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:hachimi}
# SQL初始化 - 创建缺失的表
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create.sql

# Redis 配置（独立数据库）
spring.data.redis.database=1
spring.data.redis.password=${REDIS_PASSWORD:hachimi}

############## 测试特定配置覆盖 ##############
# 测试环境使用较小的文件上传限制
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# 关闭 Sa-Token 日志（减少测试输出）
sa-token.is-log=false
# 允许从cookie中读取token（便于测试）
sa-token.is-read-cookie=true

############## CORS 配置 ##############
# 允许的来源模式（测试环境允许所有来源）
app.cors.allowed-origin-patterns=*

############## S3 对象存储配置（测试环境） ##############
file.storage.s3.endpoint=
file.storage.s3.region=us-east-1
file.storage.s3.access-key=test-key
file.storage.s3.secret-key=test-secret
file.storage.s3.bucket-name=test-bucket
file.storage.s3.presigned-url-expiration=1800
file.storage.s3.path-style-access=false

############## 积分配置 ##############
points.upload=10
points.register=100

############## 日志配置 - 减少测试输出 ##############
logging.level.root=WARN
logging.level.top.enderliquid.audioflow=WARN
