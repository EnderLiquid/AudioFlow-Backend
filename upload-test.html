<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioFlow 上传测试</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.failure {
            background: #f8d7da;
            color: #721c24;
        }
        .step {
            padding: 8px;
            margin: 5px 0;
        }
        .step.pending {
            color: #999;
        }
        .step.in-progress {
            color: #ff9800;
            animation: blink 1s infinite;
        }
        .step.success {
            color: #28a745;
        }
        .step.failure {
            color: #dc3545;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 4px;
        }
        #error {
            color: #dc3545;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="section">
        <h2>后端地址</h2>
        <div class="input-group">
            <label>Base URL:</label>
            <input type="text" id="baseUrl" value="http://localhost:8080" placeholder="http://localhost:8081">
            <button onclick="testConnection()">连接测试</button>
        </div>
        <div id="connectionStatus" class="status">未连接</div>
    </div>

    <div class="section">
        <h2>登录</h2>
        <div class="input-group">
            <label>邮箱:</label>
            <input type="email" id="email" placeholder="user@example.com">
        </div>
        <div class="input-group">
            <label>密码:</label>
            <input type="password" id="password" placeholder="password">
        </div>
        <button onclick="login()">登录</button>
        <div id="loginStatus" class="status">未登录</div>
    </div>

    <script>
        let satoken = null;

        function testConnection() {
            const baseUrl = document.getElementById('baseUrl').value;
            const status = document.getElementById('connectionStatus');
            status.innerHTML = '连接中...';
            status.className = 'status';

            fetch(`${baseUrl}/api/sessions`, {
                method: 'OPTIONS'
            }).then(response => {
                if (response.ok || response.status === 405) {
                    status.innerHTML = '连接成功';
                    status.className = 'status success';
                } else {
                    status.innerHTML = '连接失败';
                    status.className = 'status failure';
                }
            }).catch(error => {
                status.innerHTML = `连接失败: ${error.message}`;
                status.className = 'status failure';
            });
        }

        function login() {
            const baseUrl = document.getElementById('baseUrl').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('loginStatus');

            if (!email || !password) {
                status.innerHTML = '请填写邮箱和密码';
                status.className = 'status failure';
                return;
            }

            status.innerHTML = '登录中...';
            status.className = 'status';

            fetch(`${baseUrl}/api/sessions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                }),
                credentials: 'include'
            }).then(response => {
                return response.json();
            }).then(data => {
                if (data.success) {
                    satoken = document.cookie.match(/satoken=([^;]+)/)?.[1];
                    status.innerHTML = `登录成功 - ${data.data.name}`;
                    status.className = 'status success';
                } else {
                    status.innerHTML = `登录失败: ${data.message}`;
                    status.className = 'status failure';
                }
            }).catch(error => {
                status.innerHTML = `登录失败: ${error.message}`;
                status.className = 'status failure';
            });
        }
    </script>
</body>
</html>
