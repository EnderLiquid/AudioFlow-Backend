############## 生产环境配置 ##############
# 服务器端口
server.port=80

############## 数据库配置 ##############
# 数据库服务器 url
spring.datasource.url=jdbc:mysql://prod-db.example.com:3306/audioflow?useSSL=true&serverTimezone=UTC
# 数据库服务器用户名
spring.datasource.username=audioflow
# 数据库服务器密码（从环境变量读取，或从外部配置文件覆盖）
spring.datasource.password=${DB_PASSWORD:}

# JDBC驱动类名
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############## HikariCP 连接池配置（生产环境） ##############
# 连接池名称
spring.datasource.hikari.pool-name=AudioFlowProdPool
# 最大连接数（生产环境根据服务器配置调整，公式：CPU核心数 * 2 + 有效磁盘数）
spring.datasource.hikari.maximum-pool-size=20
# 最小空闲连接数
spring.datasource.hikari.minimum-idle=5
# 连接超时时间（毫秒）
spring.datasource.hikari.connection-timeout=30000
# 空闲连接超时时间（毫秒）
spring.datasource.hikari.idle-timeout=600000
# 连接最大存活时间（毫秒）
spring.datasource.hikari.max-lifetime=1800000
# 连接检测语句
spring.datasource.hikari.connection-test-query=SELECT 1

############## Redis 配置 ##############
# Redis 数据库索引（默认为0）
spring.data.redis.database=0
# Redis 服务器地址
spring.data.redis.host=prod-redis.example.com
# Redis 服务器连接端口
spring.data.redis.port=6379
# Redis 服务器连接密码（从环境变量读取，或从外部配置文件覆盖）
spring.data.redis.password=${REDIS_PASSWORD:}

############## CORS 配置 ##############
# 允许的来源模式（生产环境留空，需要根据实际情况配置）
app.cors.allowed-origin-patterns=
